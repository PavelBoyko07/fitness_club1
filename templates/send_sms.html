<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестовая отправка SMS</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: #fff; padding: 30px 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; position: relative; }
        h2 { text-align: center; margin-bottom: 25px; color: #333; }
        form label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
        form input, form textarea { width: 100%; padding: 10px 12px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; transition: border 0.2s; }
        form input:focus, form textarea:focus { border-color: #4CAF50; outline: none; }
        button { margin-top: 20px; width: 100%; padding: 12px; font-size: 16px; font-weight: bold; background-color: #4CAF50; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #45a049; }
        .status-card { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); padding: 12px 20px; background-color: #4CAF50; color: #fff; border-radius: 8px; opacity: 0; animation: fadeInOut 3s forwards; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        @keyframes fadeInOut { 0% {opacity: 0; transform: translateX(-50%) translateY(-20px);} 10% {opacity: 1; transform: translateX(-50%) translateY(0);} 90% {opacity: 1; transform: translateX(-50%) translateY(0);} 100% {opacity: 0; transform: translateX(-50%) translateY(-20px);} }
        .error { color: #e74c3c; font-size: 0.85em; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Тестовая отправка SMS</h2>

        {% if status %}
            <div class="status-card">{{ status }}</div>
        {% endif %}

        <form method="post" id="smsForm">
            {% csrf_token %}
            {{ form.non_field_errors }}

            {% for field in form %}
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="error">{{ field.errors }}</div>
                {% endif %}
            {% endfor %}

            <button type="submit">Отправить</button>
        </form>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const statusCard = document.querySelector('.status-card');
            if(statusCard){
                setTimeout(() => { statusCard.style.display = 'none'; }, 3000);
            }
        });
    </script>
</body>
</html>
