{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
<section class="py-5 bg-light min-vh-100"><div class="container"><div class="row justify-content-center"><div class="col-md-5"><div class="card border-0 shadow rounded-4"><div class="card-body p-4"><h2 class="text-center fw-bold mb-4">Вход</h2><form method="post">{% csrf_token %}{% if form.errors %}<div class="alert alert-danger">Проверьте логин и пароль.</div>{% endif %}<div class="mb-3">{{ form.username }}</div><div class="mb-3">{{ form.password }}</div><button type="submit" class="btn btn-dark w-100 rounded-pill">Войти</button></form><p class="text-center mt-3 mb-0">Нет аккаунта? <a href="{% url 'register' %}">Зарегистрируйтесь</a></p></div></div></div></div></div></section>
{% endblock %}
