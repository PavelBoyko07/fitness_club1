{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="py-5 auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="auth-card">
                    <div class="auth-card-body">
                        <h2 class="text-center fw-bold mb-4">Вход</h2>

                        <form method="post" class="auth-form">
                            {% csrf_token %}

                            {% if form.errors %}
                            <div class="alert alert-danger rounded-4">
                                Проверьте логин и пароль.
                            </div>
                            {% endif %}

                            <div class="mb-3">
                                {{ form.username }}
                            </div>

                            <div class="mb-3">
                                {{ form.password }}
                            </div>

                            <button type="submit" class="auth-btn-dark w-100">
                                Войти
                            </button>
                        </form>

                        <p class="text-center mt-3 mb-0 text-muted">
                            Нет аккаунта?
                            <a href="{% url 'register' %}" class="auth-link">
                                Зарегистрируйтесь
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
